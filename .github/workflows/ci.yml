name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Confirm stdlib-only
        run: |
          python3 -c "import mismatch_engine_ai, template_guard, risk_delta, verify_commitment; print('imports ok')"

      - name: Run test suite
        run: python3 -m unittest test_mismatch_engine_ai test_template_guard test_risk_delta -v

      - name: Verify commitment hashes
        run: python3 verify_commitment.py

      - name: Demo CLI on clean packet
        run: python3 mismatch_engine_ai.py samples/clean_packet/

      - name: Demo CLI on contaminated packet
        run: python3 mismatch_engine_ai.py samples/contaminated_packet/

      - name: Demo CLI on templated legitimate packet (with guard)
        run: |
          python3 mismatch_engine_ai.py samples/templated_legitimate_packet/ \
            --template samples/templated_legitimate_packet/_TEMPLATE_SKELETON.md
